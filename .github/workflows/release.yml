name: Release

on:
  workflow_run:
    workflows: ["Build"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve source run
        id: src
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            RUN_ID="${{ github.event.workflow_run.id }}"
            SRC_SHA="${{ github.event.workflow_run.head_sha }}"
          else
            RUN_ID=$(gh run list --workflow Build --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId')
            if [ -z "$RUN_ID" ]; then
              echo "::error::No successful build run found on main"; exit 1
            fi
            SRC_SHA=$(gh run view "$RUN_ID" --json headSha --jq '.headSha')
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "sha=$SRC_SHA" >> "$GITHUB_OUTPUT"
          echo "short=${SRC_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Compose tag name
        id: tag
        run: |
          DATE=$(date -u +%Y%m%d)
          TAG="sovagram-${DATE}-${{ steps.src.outputs.short }}"
          echo "name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Skip if tag exists
        id: check
        run: |
          if git rev-parse "refs/tags/${{ steps.tag.outputs.name }}" >/dev/null 2>&1; then
            echo "status=exists" >> "$GITHUB_OUTPUT"
          else
            echo "status=new" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifact
        if: steps.check.outputs.status == 'new'
        uses: actions/download-artifact@v4
        with:
          name: Sovagram-x64-qt6-${{ steps.src.outputs.sha }}
          path: ./artifact
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.src.outputs.run_id }}

      - name: Package zip
        if: steps.check.outputs.status == 'new'
        run: |
          cd artifact
          ZIP="../sovagram-${{ steps.tag.outputs.name }}.zip"
          zip -9 "$ZIP" *.exe *.dll

      - name: Tag commit
        if: steps.check.outputs.status == 'new'
        run: |
          git config user.email "release-bot@users.noreply.github.com"
          git config user.name "release-bot"
          git tag -a "${{ steps.tag.outputs.name }}" \
            -m "Automated Sovagram build from ${{ steps.src.outputs.short }}" \
            "${{ steps.src.outputs.sha }}"
          git push origin "${{ steps.tag.outputs.name }}"

      - name: Create GitHub Release
        if: steps.check.outputs.status == 'new'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.name }}" \
            --target "${{ steps.src.outputs.sha }}" \
            --title "Sovagram ${{ steps.tag.outputs.name }}" \
            --notes "Automated build from commit ${{ steps.src.outputs.sha }} on main.

          To update: download **Sovagram.exe** below and replace your current one (also grab **singbox.dll** if you use VLESS proxy).

          Assets:
          - Sovagram.exe — the main binary (Windows x64, Debug)
          - Updater.exe — Telegram Desktop's built-in updater (unused by this fork for now)
          - singbox.dll — VLESS sidecar
          - sovagram-${{ steps.tag.outputs.name }}.zip — all of the above bundled

          Built by [run ${{ steps.src.outputs.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ steps.src.outputs.run_id }})." \
            "artifact/Sovagram.exe" \
            "artifact/Updater.exe" \
            "artifact/singbox.dll" \
            "sovagram-${{ steps.tag.outputs.name }}.zip"
