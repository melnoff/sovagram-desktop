name: Sync Upstream

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      target_ref:
        description: 'Upstream ref (tag/branch). Empty = latest stable tag.'
        required: false
      dry_run:
        description: 'Dry run (do not push / trigger build).'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  actions: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

env:
  MASTER_BRANCH: master
  PATCHES_FILE: .sync/patches.txt

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.MASTER_BRANCH }}
          submodules: true
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.email "sync-bot@users.noreply.github.com"
          git config user.name "sync-bot"

      - name: Fetch upstream tags
        run: |
          cd tdesktop
          git fetch origin --tags --no-recurse-submodules --prune

      - name: Read patches config
        id: patches
        run: |
          LIST=$(grep -Ev '^\s*(#|$)' "$PATCHES_FILE" | tr '\n' ' ')
          if [ -z "$LIST" ]; then
            echo "::error::No patches listed in $PATCHES_FILE"; exit 1
          fi
          echo "list=$LIST" >> "$GITHUB_OUTPUT"

      - name: Resolve target ref
        id: target
        run: |
          INPUT="${{ github.event.inputs.target_ref }}"
          cd tdesktop
          if [ -n "$INPUT" ]; then
            REF="$INPUT"
          else
            REF=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)
          fi
          SHA=$(git rev-parse "$REF")
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Resolve previous upstream ref (for snapshot branch)
        id: prev
        run: |
          cd tdesktop
          PREV_SHA=$(git rev-parse HEAD)
          PREV_REF=$(git describe --tags --exact-match HEAD 2>/dev/null \
            || git describe --tags --always HEAD)
          echo "ref=$PREV_REF" >> "$GITHUB_OUTPUT"
          echo "sha=$PREV_SHA" >> "$GITHUB_OUTPUT"
          {
            echo "## Sync"
            echo "- from submodule ref: \`$PREV_REF\` ($PREV_SHA)"
            echo "- to target ref:      \`${{ steps.target.outputs.ref }}\` (${{ steps.target.outputs.sha }})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Decide if advance is needed
        id: need
        run: |
          cd tdesktop
          TARGET="${{ steps.target.outputs.sha }}"
          CURRENT="${{ steps.prev.outputs.sha }}"
          if [ "$CURRENT" = "$TARGET" ]; then
            echo "status=current" >> "$GITHUB_OUTPUT"
          elif git merge-base --is-ancestor "$TARGET" "$CURRENT"; then
            echo "status=behind" >> "$GITHUB_OUTPUT"
            echo "::warning::Target is behind current submodule head; not rewinding."
          else
            echo "status=advance" >> "$GITHUB_OUTPUT"
          fi

      - name: Advance submodule
        if: steps.need.outputs.status == 'advance'
        run: |
          cd tdesktop
          git checkout --detach "${{ steps.target.outputs.sha }}"

      - name: Try-apply patches on fresh base
        if: steps.need.outputs.status == 'advance'
        id: apply
        run: |
          cd tdesktop
          FAILED=""
          for p in ${{ steps.patches.outputs.list }}; do
            echo "::group::git am ../patches/$p/*.patch"
            if git am --3way --keep-cr ../patches/$p/*.patch; then
              echo "  OK"
            else
              git am --abort || true
              FAILED="$FAILED $p"
              break
            fi
            echo "::endgroup::"
          done
          FAILED="${FAILED# }"
          if [ -n "$FAILED" ]; then
            echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
            echo "status=conflict" >> "$GITHUB_OUTPUT"
          else
            echo "status=ok" >> "$GITHUB_OUTPUT"
          fi

      - name: Regenerate patches with updated context
        if: steps.apply.outputs.status == 'ok'
        run: |
          cd tdesktop
          TOTAL=$(grep -Ev '^\s*(#|$)' ../$PATCHES_FILE | wc -l)
          git format-patch --binary -$TOTAL -o ../patches-new/ HEAD
          cd ..
          IDX=1
          for p in ${{ steps.patches.outputs.list }}; do
            rm -f patches/$p/*.patch
            FILE=$(printf "patches-new/%04d-*.patch" $IDX)
            mv $FILE patches/$p/
            IDX=$((IDX+1))
          done
          rm -rf patches-new
          cd tdesktop
          git checkout --detach "${{ steps.target.outputs.sha }}"

      - name: Create snapshot branch of previous master
        if: steps.apply.outputs.status == 'ok' && github.event.inputs.dry_run != 'true'
        id: snapshot
        run: |
          SNAP_NAME="${{ steps.prev.outputs.ref }}"
          OLD_MASTER_SHA=$(git rev-parse "origin/$MASTER_BRANCH")
          if git ls-remote --heads origin "refs/heads/$SNAP_NAME" | grep -q .; then
            echo "Snapshot branch \`$SNAP_NAME\` already exists; leaving it frozen." \
              >> "$GITHUB_STEP_SUMMARY"
            echo "status=existing" >> "$GITHUB_OUTPUT"
          else
            git push origin "$OLD_MASTER_SHA:refs/heads/$SNAP_NAME"
            echo "Created snapshot branch \`$SNAP_NAME\` at $OLD_MASTER_SHA." \
              >> "$GITHUB_STEP_SUMMARY"
            echo "status=created" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + push master
        if: steps.apply.outputs.status == 'ok' && github.event.inputs.dry_run != 'true'
        run: |
          git add tdesktop patches/
          if git diff --cached --quiet; then
            echo "No changes to commit." >> "$GITHUB_STEP_SUMMARY"
          else
            git commit -m "sync: tdesktop ${{ steps.prev.outputs.ref }} -> ${{ steps.target.outputs.ref }}, refresh patches"
            git push origin "$MASTER_BRANCH"
          fi

      - name: Trigger build
        if: steps.apply.outputs.status == 'ok' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run build.yml --ref "$MASTER_BRANCH"

      - name: Open conflict issue
        if: steps.apply.outputs.status == 'conflict'
        uses: actions/github-script@v7
        env:
          TARGET_REF: ${{ steps.target.outputs.ref }}
          FAILED: ${{ steps.apply.outputs.failed }}
        with:
          script: |
            const target = process.env.TARGET_REF;
            const failed = (process.env.FAILED || '').trim().split(/\s+/).filter(Boolean);
            const title = `Sync: patch apply failed onto ${target}`;
            const body = [
              `Automated \`git am\` onto upstream \`${target}\` failed for:`,
              ``,
              ...failed.map(p => `- \`patches/${p}\``),
              ``,
              `Resolve manually (local workflow):`,
              `\`\`\`bash`,
              `cd tdesktop && git fetch origin --tags && git checkout ${target}`,
              ...failed.map(p => `git am --3way ../patches/${p}/*.patch  # resolve, git am --continue`),
              `cd ..`,
              `# Save the old state under its upstream ref name:`,
              `git push origin origin/master:refs/heads/<previous-upstream-ref>`,
              `# Regenerate patches, bump submodule pointer, push master.`,
              `\`\`\``,
              ``,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', per_page: 100,
            });
            if (existing.some(i => i.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo, title, body,
            });
